name: BNS Downloader v1.6

on:
  workflow_dispatch:
    inputs:
      story_url:
        description: 'URL truyện (không phải muc-luc). Ví dụ: https://bachngocsach.cc/reader/quy-bi-chi-chu'
        required: true
        type: string

      format:
        description: 'Output format'
        required: true
        default: 'epub'
        type: choice
        options:
          - epub
          - txt
          - md
          - json
          - epub,txt
          - epub,txt,md
          - epub,txt,md,json

      artifact_name:
        description: 'Tên artifact (để trống = tự sinh)'
        required: false
        type: string

      throttle_ms:
        description: 'Delay giữa chapters (ms). Thấp hơn = nhanh hơn nhưng dễ 429.'
        required: false
        default: '900'
        type: string

      save_every:
        description: 'Save state mỗi N chapters tải mới (giảm IO → nhanh hơn)'
        required: false
        default: '5'
        type: string

      chapter_from:
        description: 'Chương bắt đầu (số thứ tự theo mục lục, bắt đầu từ 1). Để trống = từ đầu truyện.'
        required: false
        type: string

      chapter_to:
        description: 'Chương kết thúc (bao gồm). Để trống = đến chương cuối.'
        required: false
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Restore download state
        uses: actions/cache@v5
        with:
          path: bns-state.json
          key: bns-state-${{ hashFiles('.github/workflows/bns-download.yml') }}-${{ github.event.inputs.story_url }}
          restore-keys: |
            bns-state-

      - name: Download story
        env:
          BNS_USERNAME: ${{ secrets.BNS_USERNAME }}
          BNS_PASSWORD: ${{ secrets.BNS_PASSWORD }}
        run: |
          FORMAT="${{ github.event.inputs.format || 'epub' }}"
          THROTTLE_MS="${{ github.event.inputs.throttle_ms || '900' }}"
          SAVE_EVERY="${{ github.event.inputs.save_every || '5' }}"
          STORY_URL="${{ github.event.inputs.story_url }}"
          CF="${{ github.event.inputs.chapter_from }}"
          CT="${{ github.event.inputs.chapter_to }}"
          EXTRA=()
          [ -n "$CF" ] && EXTRA+=(--chapter-from "$CF")
          [ -n "$CT" ] && EXTRA+=(--chapter-to "$CT")

          node bns.js \
            --story-url "$STORY_URL" \
            --format "$FORMAT" \
            --output ./output \
            --state ./bns-state.json \
            --throttle-ms "$THROTTLE_MS" \
            --save-every "$SAVE_EVERY" \
            "${EXTRA[@]}"
        continue-on-error: true

      - name: Save download state
        uses: actions/cache/save@v5
        if: always()
        with:
          path: bns-state.json
          key: bns-state-${{ hashFiles('.github/workflows/bns-download.yml') }}-${{ github.event.inputs.story_url }}

      - name: List output files
        run: |
          echo "=== Files đã tạo ==="
          if [ -d output ] && [ "$(ls -A output)" ]; then
            ls -lh output/
            echo "Tổng: $(du -sh output/ | cut -f1)"
          else
            echo "Không có file nào."
          fi

      - name: Resolve artifact name
        id: art
        run: |
          NAME="${{ github.event.inputs.artifact_name }}"
          if [ -z "$NAME" ]; then
            DATE=$(date '+%Y-%m-%d')
            NAME="bns-ebooks_${DATE}_run-${{ github.run_number }}"
          fi
          NAME=$(echo "$NAME" | tr -cs 'a-zA-Z0-9_-' '-' | sed 's/-*$//')
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "Artifact name: $NAME"

      - name: Upload ebooks
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: ${{ steps.art.outputs.name }}
          path: output/
          retention-days: 30
          if-no-files-found: warn

