name: Wattpad Downloader v2.1

on:
  workflow_dispatch:
    inputs:
      format:
        description: 'Output format'
        required: true
        default: 'epub'
        type: choice
        options:
          - epub
          - txt
          - md
          - json
          - epub,txt
          - epub,txt,md
          - epub,txt,md,json

      urls:
        description: 'URLs muốn tải (mỗi dòng 1, để trống = dùng urls.txt)'
        required: false
        type: string

      artifact_name:
        description: 'Tên artifact (để trống = tự sinh)'
        required: false
        type: string

      chapters_map:
        description: 'Chapter map JSON — sinh tự động từ UI, không cần nhập tay'
        required: false
        type: string

      chapter_from:
        description: 'Wattpad — chương bắt đầu (1-based, theo mục lục). Để trống = từ đầu. Áp dụng mỗi URL/story; giao với chapters_map nếu có.'
        required: false
        type: string

      chapter_to:
        description: 'Wattpad — chương kết thúc (gồm cả số này). Để trống = đến hết. Áp dụng mỗi URL/story.'
        required: false
        type: string

      throttle_ms:
        description: 'Delay giữa chapters (ms). Thấp hơn = nhanh hơn nhưng dễ 429.'
        required: false
        default: '900'
        type: string

      save_every:
        description: 'Ghi state sau mỗi N chapter tải mạng (1 = mỗi chapter, resume Actions ổn định; 5 = ít IO hơn)'
        required: false
        default: '1'
        type: string

      max_part_mb:
        description: 'TXT/MD/JSON (gộp merged) — tối đa MB mỗi file phần. 0 = một file. per_chapter bỏ qua.'
        required: false
        default: '0'
        type: string

      text_layout:
        description: 'TXT/MD/JSON — merged (gộp + max_part_mb) hoặc per_chapter (mỗi chương một file)'
        required: false
        default: 'merged'
        type: choice
        options:
          - merged
          - per_chapter

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Prepare URLs
        run: |
          if [ -n "${{ github.event.inputs.urls }}" ]; then
            printf '%s' "${{ github.event.inputs.urls }}" > urls_run.txt
          elif [ -f urls.txt ]; then
            cp urls.txt urls_run.txt
          else
            echo "❌ Không có URLs!"
            exit 1
          fi
          echo "=== URLs sẽ tải ==="
          cat urls_run.txt
          echo ""
          echo "Tổng: $(grep -c 'wattpad' urls_run.txt || echo 0) URL"

      - name: Restore download state
        uses: actions/cache@v5
        with:
          path: |
            state.json
            state-bodies
          key: wattpad-state-${{ hashFiles('urls_run.txt') }}
          restore-keys: |
            wattpad-state-

      - name: State cache diagnostics (sau Restore)
        run: |
          echo "=== State cache diagnostics (A: kiểm tra cache Actions có về runner không) ==="
          echo "Lưu ý: key đầy đủ là wattpad-state-<sha256 urls_run.txt>; restore-keys có thể khôi phục entry cũ hơn (prefix wattpad-state-)."
          echo ""
          echo "--- urls_run.txt (ảnh hưởng cache key) ---"
          if [ -f urls_run.txt ]; then
            echo "Kích thước: $(wc -c < urls_run.txt) bytes"
            echo "sha256: $(sha256sum urls_run.txt | cut -d' ' -f1)"
          else
            echo "Không tìm thấy urls_run.txt"
          fi
          echo ""
          echo "--- state.json ---"
          if [ -f state.json ]; then
            echo "Có file. Kích thước: $(wc -c < state.json) bytes"
            DONE_N=$(grep -oE '"status"[[:space:]]*:[[:space:]]*"done"' state.json 2>/dev/null | wc -l | tr -d ' ')
            echo "Số lần xuất hiện status \"done\" trong JSON (ước lượng chapter đã cache): ${DONE_N:-0}"
          else
            echo "KHÔNG CÓ — Actions cache miss hoặc chưa từng Save state thành công với key khớp."
          fi
          echo ""
          echo "--- state-bodies/ ---"
          if [ -d state-bodies ]; then
            F=$(find state-bodies -type f 2>/dev/null | wc -l | tr -d ' ')
            echo "Thư mục có $F file nội dung chương."
            du -sh state-bodies 2>/dev/null || true
          else
            echo "KHÔNG CÓ thư mục — nếu state.json có bodyRef, script sẽ không coi chapter là đã cache đủ."
          fi
          echo "=== Hết diagnostics ==="

      - name: Download stories
        env:
          CHAPTERS_MAP: ${{ github.event.inputs.chapters_map }}
        run: |
          FORMAT="${{ github.event.inputs.format || 'epub' }}"
          THROTTLE_MS="${{ github.event.inputs.throttle_ms || '900' }}"
          SAVE_EVERY="${{ github.event.inputs.save_every || '1' }}"
          MAX_PART_MB="${{ github.event.inputs.max_part_mb || '0' }}"
          TEXT_LAYOUT="${{ github.event.inputs.text_layout || 'merged' }}"

          ARGS=(node wattpad.js --batch urls_run.txt --format "$FORMAT" --output ./output --state ./state.json --throttle-ms "$THROTTLE_MS" --save-every "$SAVE_EVERY")
          CH_FROM="${{ github.event.inputs.chapter_from }}"
          CH_TO="${{ github.event.inputs.chapter_to }}"
          if [ -n "$CH_FROM" ]; then ARGS+=(--chapter-from "$CH_FROM"); fi
          if [ -n "$CH_TO" ]; then ARGS+=(--chapter-to "$CH_TO"); fi
          if [ -n "$CHAPTERS_MAP" ]; then
            printf '%s' "$CHAPTERS_MAP" > chapters_map_run.json
            ARGS+=(--chapters-map-file chapters_map_run.json)
          fi
          if [ "$TEXT_LAYOUT" = "per_chapter" ]; then
            ARGS+=(--text-layout per-chapter)
          fi
          if [ -n "$MAX_PART_MB" ] && [ "$MAX_PART_MB" != "0" ] && [ "$MAX_PART_MB" != "0.0" ]; then
            ARGS+=(--max-part-mb "$MAX_PART_MB")
          fi
          "${ARGS[@]}"
        continue-on-error: true

      - name: Save download state
        uses: actions/cache/save@v5
        if: always()
        with:
          path: |
            state.json
            state-bodies
          key: wattpad-state-${{ hashFiles('urls_run.txt') }}

      - name: List output files
        run: |
          echo "=== Files đã tạo ==="
          if [ -d output ] && [ "$(ls -A output)" ]; then
            ls -lh output/
            echo "Tổng: $(du -sh output/ | cut -f1)"
          else
            echo "Không có file nào."
          fi

      - name: Resolve artifact name
        id: art
        run: |
          NAME="${{ github.event.inputs.artifact_name }}"
          if [ -z "$NAME" ]; then
            DATE=$(date '+%Y-%m-%d')
            NAME="wattpad-ebooks_${DATE}_run-${{ github.run_number }}"
          fi
          NAME=$(echo "$NAME" | tr -cs 'a-zA-Z0-9_-' '-' | sed 's/-*$//')
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "Artifact name: $NAME"

      - name: Upload ebooks
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: ${{ steps.art.outputs.name }}
          path: output/
          retention-days: 30
          if-no-files-found: warn

