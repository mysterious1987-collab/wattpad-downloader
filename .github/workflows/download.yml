name: Wattpad Downloader v1.9

on:
  workflow_dispatch:
    inputs:
      format:
        description: 'Output format'
        required: true
        default: 'epub'
        type: choice
        options:
          - epub
          - txt
          - md
          - json
          - epub,txt
          - epub,txt,md
          - epub,txt,md,json

      urls:
        description: 'URLs muốn tải (mỗi dòng 1, để trống = dùng urls.txt)'
        required: false
        type: string

      artifact_name:
        description: 'Tên artifact (để trống = tự sinh)'
        required: false
        type: string

      chapters_map:
        description: 'Chapter map JSON — sinh tự động từ UI, không cần nhập tay'
        required: false
        type: string

      throttle_ms:
        description: 'Delay giữa chapters (ms). Thấp hơn = nhanh hơn nhưng dễ 429.'
        required: false
        default: '900'
        type: string

      save_every:
        description: 'Save state mỗi N chapters tải mới (giảm IO → nhanh hơn)'
        required: false
        default: '5'
        type: string

      max_part_mb:
        description: 'TXT/MD/JSON (gộp merged) — tối đa MB mỗi file phần. 0 = một file. per_chapter bỏ qua.'
        required: false
        default: '0'
        type: string

      text_layout:
        description: 'TXT/MD/JSON — merged (gộp + max_part_mb) hoặc per_chapter (mỗi chương một file)'
        required: false
        default: 'merged'
        type: choice
        options:
          - merged
          - per_chapter

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Prepare URLs
        run: |
          if [ -n "${{ github.event.inputs.urls }}" ]; then
            printf '%s' "${{ github.event.inputs.urls }}" > urls_run.txt
          elif [ -f urls.txt ]; then
            cp urls.txt urls_run.txt
          else
            echo "❌ Không có URLs!"
            exit 1
          fi
          echo "=== URLs sẽ tải ==="
          cat urls_run.txt
          echo ""
          echo "Tổng: $(grep -c 'wattpad' urls_run.txt || echo 0) URL"

      - name: Restore download state
        uses: actions/cache@v5
        with:
          path: |
            state.json
            state-bodies
          key: wattpad-state-${{ hashFiles('urls_run.txt') }}
          restore-keys: |
            wattpad-state-

      - name: Download stories
        run: |
          FORMAT="${{ github.event.inputs.format || 'epub' }}"
          CHAPTERS_MAP="${{ github.event.inputs.chapters_map }}"
          THROTTLE_MS="${{ github.event.inputs.throttle_ms || '900' }}"
          SAVE_EVERY="${{ github.event.inputs.save_every || '5' }}"
          MAX_PART_MB="${{ github.event.inputs.max_part_mb || '0' }}"
          TEXT_LAYOUT="${{ github.event.inputs.text_layout || 'merged' }}"

          CMD="node wattpad.js --batch urls_run.txt --format \"$FORMAT\" --output ./output --state ./state.json --throttle-ms \"$THROTTLE_MS\" --save-every \"$SAVE_EVERY\""

          if [ -n "$CHAPTERS_MAP" ]; then
            CMD="$CMD --chapters-map '$CHAPTERS_MAP'"
          fi

          if [ "$TEXT_LAYOUT" = "per_chapter" ]; then
            CMD="$CMD --text-layout per-chapter"
          fi

          if [ -n "$MAX_PART_MB" ] && [ "$MAX_PART_MB" != "0" ] && [ "$MAX_PART_MB" != "0.0" ]; then
            CMD="$CMD --max-part-mb \"$MAX_PART_MB\""
          fi

          eval $CMD
        continue-on-error: true

      - name: Save download state
        uses: actions/cache/save@v5
        if: always()
        with:
          path: |
            state.json
            state-bodies
          key: wattpad-state-${{ hashFiles('urls_run.txt') }}

      - name: List output files
        run: |
          echo "=== Files đã tạo ==="
          if [ -d output ] && [ "$(ls -A output)" ]; then
            ls -lh output/
            echo "Tổng: $(du -sh output/ | cut -f1)"
          else
            echo "Không có file nào."
          fi

      - name: Resolve artifact name
        id: art
        run: |
          NAME="${{ github.event.inputs.artifact_name }}"
          if [ -z "$NAME" ]; then
            DATE=$(date '+%Y-%m-%d')
            NAME="wattpad-ebooks_${DATE}_run-${{ github.run_number }}"
          fi
          NAME=$(echo "$NAME" | tr -cs 'a-zA-Z0-9_-' '-' | sed 's/-*$//')
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "Artifact name: $NAME"

      - name: Upload ebooks
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: ${{ steps.art.outputs.name }}
          path: output/
          retention-days: 30
          if-no-files-found: warn

